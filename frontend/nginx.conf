server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        # Attachment uploads: nginx's default cap is 1 MB, which 413'd any
        # real photo. Match the backend's multipart limit (80 MB per request).
        client_max_body_size 80m;
        # Server-Sent Events (streaming chat) must not be buffered, or the
        # reply arrives all at once instead of token-by-token.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        try_files $uri /index.html;
    }
}
