spring:
  application:
    name: sahayak

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      # Chat attachments: 15 MB per file (matches AttachmentService), a little
      # headroom on the whole request so several files can upload together.
      max-file-size: 16MB
      max-request-size: 80MB

  autoconfigure:
    # Vendor auto-configs refuse to start when their API key is blank, but every
    # provider must stay optional here (and BYOK builds per-user clients anyway) —
    # so ChatClientFactory builds ALL chat models manually.
    exclude:
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agentdb}
    username: ${DB_USER:agent}
    password: ${DB_PASSWORD:agent}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  ai:
    # Set the API key of every provider you want available; any subset works.
    anthropic:
      # https://console.anthropic.com
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-5}
          max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}
    openai:
      # https://platform.openai.com/api-keys
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5-mini}
    google:
      genai:
        # https://aistudio.google.com/apikey
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.5-flash}
    chat:
      client:
        # We build one ChatClient per provider ourselves (see AiConfig).
        enabled: false
      memory:
        repository:
          jdbc:
            # Creates the chat-history table in Postgres on first start.
            initialize-schema: always

server:
  port: 8080

app:
  # Which configured AI provider answers by default: anthropic | openai | gemini | groq.
  # Blank = the first configured one (in that order).
  default-ai: ${APP_DEFAULT_AI:}
  groq:
    # https://console.groq.com/keys — free tier with generous limits.
    # Groq speaks the OpenAI protocol, so no extra SDK is needed.
    api-key: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:openai/gpt-oss-120b}
  github:
    # https://github.com/settings/tokens — any GitHub account gets free
    # (rate-limited) model access; the key is a GitHub token.
    api-key: ${GITHUB_MODELS_KEY:}
    model: ${GITHUB_MODELS_MODEL:openai/gpt-4o-mini}
  cerebras:
    # https://cloud.cerebras.ai — free tier, very fast Llama models.
    api-key: ${CEREBRAS_API_KEY:}
    model: ${CEREBRAS_MODEL:llama-3.3-70b}
  mistral:
    # https://console.mistral.ai — free "experiment" tier.
    api-key: ${MISTRAL_API_KEY:}
    model: ${MISTRAL_MODEL:mistral-small-latest}
  openrouter:
    # https://openrouter.ai/keys — many models, some free. The free models
    # can't use tools, so this engine is offered as CHAT-ONLY.
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:meta-llama/llama-3.3-70b-instruct:free}
  # Long random string. Protects login tokens and encrypts stored app passwords.
  # If empty, one is generated and saved to <home>/.sahayak/app-secret.txt
  secret: ${APP_SECRET:}
  # Where the browser app lives (used for redirects after connecting LinkedIn, and CORS).
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  # Public address of this backend (used to build the LinkedIn OAuth redirect URL).
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # Set to false to stop new people from registering (existing accounts keep working).
  allow-signups: ${APP_ALLOW_SIGNUPS:true}
  # Max chat messages per user per minute (each message costs Anthropic API credits).
  chat-rate-limit-per-minute: ${APP_CHAT_RATE_LIMIT:30}
  linkedin:
    # Create an app at https://developer.linkedin.com to enable LinkedIn posting.
    client-id: ${LINKEDIN_CLIENT_ID:}
    client-secret: ${LINKEDIN_CLIENT_SECRET:}
    # Only for multi-image posts. LinkedIn sunsets YYYYMM API versions after
    # ~1 year; the code tries several known versions automatically — set this
    # only if all of them have expired (error: "version is not active").
    api-version: ${LINKEDIN_API_VERSION:}
  github-oauth:
    # Create an OAuth app at https://github.com/settings/developers to let users
    # connect GitHub (create issues, list repos, search). This is SEPARATE from
    # the GitHub Models AI provider above (app.github.*).
    client-id: ${GITHUB_OAUTH_CLIENT_ID:}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
  google-oauth:
    # Create a Google Cloud project (free) with the Calendar API enabled and an
    # OAuth client to let users connect Google Calendar — see the README.
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
  composio:
    # OPTIONAL one-click Gmail via Composio (composio.dev) — a third-party
    # middleman, unlike every direct integration. The owner creates a free
    # Composio account, a Gmail auth config (Composio-managed auth), and
    # pastes both values here. See README "One-click Gmail via Composio".
    api-key: ${COMPOSIO_API_KEY:}
    gmail-auth-config-id: ${COMPOSIO_GMAIL_AUTH_CONFIG_ID:}

logging:
  level:
    org.springframework.ai: INFO
